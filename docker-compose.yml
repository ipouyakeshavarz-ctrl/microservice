services:
  userservice:
   dns:
      - 1.1.1.1
      - 8.8.8.8
   build:
    context: .
    dockerfile: services/userservice/Dockerfile
    args:
      SERVICE_PATH: ./services/userservice/cmd/main.go

  app-database:
    image: mysql:8.0
    ports:
      - "3311:3306"
    container_name: app-database
    volumes:
      - appdbdata:/var/lib/mysql
    restart: always
    command: [ 'mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci' ]
    environment:
      MYSQL_ROOT_PASSWORD: Mp13831383
      MYSQL_DATABASE: app_db
      MYSQL_USER: app
      MYSQL_PASSWORD: app0lk2o20

  redis:
    image: redis:7
    container_name: redis-cache
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]


  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq-broker
    ports:
      - "5672:5672"    # Port for application connection
      - "15672:15672"  # Port for management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - prometheusdata:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  appdbdata:
  redisdata:
  rabbitmqdata:
  prometheusdata:
  grafanadata:

