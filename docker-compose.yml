services:
  user-database:
    image: mysql:8.0
    ports:
      - "3311:3306"
    container_name: user-database
    volumes:
      - userdbdata:/var/lib/mysql
    restart: always
    command: [ 'mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci' ]
    environment:
      MYSQL_ROOT_PASSWORD: Mp13831383
      MYSQL_DATABASE: user_db
      MYSQL_USER: user
      MYSQL_PASSWORD: usert0lk2o20

  product-database:
    image: mysql:8.0
    ports:
      - "3310:3306"
    container_name: product-database
    volumes:
      - productdbdata:/var/lib/mysql
    restart: always
    command: [ 'mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci' ]
    environment:
      MYSQL_ROOT_PASSWORD: Mp13831383
      MYSQL_DATABASE: product_db
      MYSQL_USER: product
      MYSQL_PASSWORD: productt0lk2o20
  store-database:
    image: mysql:8.0
    ports:
      - "3312:3306"
    container_name: store-database
    volumes:
      - storedbdata:/var/lib/mysql
    restart: always
    command: [ 'mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci' ]
    environment:
      MYSQL_ROOT_PASSWORD: Mp13831383
      MYSQL_DATABASE: store_db
      MYSQL_USER: store
      MYSQL_PASSWORD: storet0lk2o20
  order-database:
    image: mysql:8.0
    ports:
      - "3314:3306"
    container_name: order-database
    volumes:
      - orderdbdata:/var/lib/mysql
    restart: always
    command: [ 'mysqld', '--character-set-server=utf8mb4', '--collation-server=utf8mb4_unicode_ci' ]
    environment:
      MYSQL_ROOT_PASSWORD: Mp13831383
      MYSQL_DATABASE: order_db
      MYSQL_USER: user
      MYSQL_PASSWORD: usert0lk2o20

  redis:
    image: redis:7
    container_name: redis-cache
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]


  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq-broker
    ports:
      - "5672:5672"    # Port for application connection
      - "15672:15672"  # Port for management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password

volumes:
  userdbdata:
  productdbdata:
  storedbdata:
  redisdata:
  rabbitmqdata:
  orderdbdata:

