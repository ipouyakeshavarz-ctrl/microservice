syntax = "proto3";

package order;

option go_package = "microservice/api/gen/order";

service OrderService {
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListUserOrders(ListUserOrdersRequest) returns (ListUserOrdersResponse);
}

message OrderItem {
  uint64 product_id = 1;
  int32 quantity = 2;
  uint64 price = 3;
}

message Order {
  string id = 1;
  string CheckoutId =2;
  uint64 user_id = 3;
  repeated OrderItem items = 4;
  uint64 total_price = 5;
  string status = 6;
  int64 created_at = 7;

}

message GetOrderRequest {
  uint64 user_id = 1;
  string order_id = 2;
}

message GetOrderResponse {
  Order order = 1;
}

message ListUserOrdersRequest {
  uint64 user_id = 1;
}

message ListUserOrdersResponse {
  repeated Order orders = 1;
}
